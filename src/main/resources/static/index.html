<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BugTracker</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>BugTracker</h1>
            <nav>
                <button class="nav-btn active" data-view="bugs">Bugs</button>
                <button class="nav-btn" data-view="dashboard">Dashboard</button>
                <button class="nav-btn" data-view="activity">Activity</button>
            </nav>
        </div>
    </header>

    <main>
        <!-- DASHBOARD VIEW -->
        <section id="dashboardView" class="view hidden">
            <div class="stats-grid" id="statsGrid"></div>
            <div class="stats-row">
                <div class="stat-card" id="statusChart">
                    <h3>By Status</h3>
                    <div class="bar-chart" id="statusBars"></div>
                </div>
                <div class="stat-card" id="priorityChart">
                    <h3>By Priority</h3>
                    <div class="bar-chart" id="priorityBars"></div>
                </div>
            </div>
        </section>

        <!-- ACTIVITY VIEW -->
        <section id="activityView" class="view hidden">
            <div class="card">
                <h2>Recent Activity</h2>
                <div id="activityList" class="activity-list"></div>
            </div>
        </section>

        <!-- BUGS VIEW -->
        <section id="bugsView" class="view">
            <section class="controls">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search bugs by title...">
                    <button id="searchBtn" class="btn btn-secondary">Search</button>
                </div>
                <div class="filter-bar">
                    <select id="statusFilter">
                        <option value="">All Statuses</option>
                        <option value="OPEN">Open</option>
                        <option value="IN_PROGRESS">In Progress</option>
                        <option value="RESOLVED">Resolved</option>
                        <option value="CLOSED">Closed</option>
                    </select>
                    <select id="priorityFilter">
                        <option value="">All Priorities</option>
                        <option value="LOW">Low</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="HIGH">High</option>
                        <option value="CRITICAL">Critical</option>
                    </select>
                    <a href="/api/bugs/export" class="btn btn-secondary" download>Export CSV</a>
                    <button id="newBugBtn" class="btn btn-primary">+ New Bug</button>
                </div>
            </section>

            <section id="bugForm" class="bug-form hidden">
                <h2 id="formTitle">Report a Bug</h2>
                <form id="bugFormElement">
                    <input type="hidden" id="bugId">
                    <div class="form-group">
                        <label for="title">Title *</label>
                        <input type="text" id="title" required maxlength="200">
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" rows="4" maxlength="2000"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="priority">Priority *</label>
                            <select id="priority" required>
                                <option value="LOW">Low</option>
                                <option value="MEDIUM" selected>Medium</option>
                                <option value="HIGH">High</option>
                                <option value="CRITICAL">Critical</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="status">Status *</label>
                            <select id="status" required>
                                <option value="OPEN" selected>Open</option>
                                <option value="IN_PROGRESS">In Progress</option>
                                <option value="RESOLVED">Resolved</option>
                                <option value="CLOSED">Closed</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="reporter">Reporter</label>
                            <input type="text" id="reporter" maxlength="100">
                        </div>
                        <div class="form-group">
                            <label for="assignee">Assignee</label>
                            <input type="text" id="assignee" maxlength="100">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
                    </div>
                </form>
            </section>

            <section class="bug-list">
                <div id="bugTable">
                    <table>
                        <thead>
                            <tr>
                                <th class="sortable" data-sort="id">ID</th>
                                <th class="sortable" data-sort="title">Title</th>
                                <th class="sortable" data-sort="priority">Priority</th>
                                <th class="sortable" data-sort="status">Status</th>
                                <th>Assignee</th>
                                <th class="sortable" data-sort="createdAt">Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="bugTableBody"></tbody>
                    </table>
                </div>
                <p id="emptyState" class="empty-state hidden">No bugs found. Click "+ New Bug" to report one.</p>
                <div id="pagination" class="pagination hidden"></div>
            </section>
        </section>

        <!-- DETAIL MODAL -->
        <div id="bugDetailModal" class="modal hidden">
            <div class="modal-content">
                <button class="modal-close" id="closeModal">&times;</button>
                <div id="bugDetailBody"></div>
                <div class="comments-section">
                    <h3>Comments</h3>
                    <div id="commentsList"></div>
                    <form id="commentForm" class="comment-form">
                        <input type="text" id="commentAuthor" placeholder="Your name" maxlength="100">
                        <textarea id="commentBody" placeholder="Add a comment..." required maxlength="1000" rows="2"></textarea>
                        <button type="submit" class="btn btn-primary btn-sm">Post</button>
                    </form>
                </div>
                <div class="activity-section">
                    <h3>Activity Log</h3>
                    <div id="bugActivityList" class="activity-list"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/app.js"></script>
</body>
</html>
