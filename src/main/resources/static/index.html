<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BugTracker</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>BugTracker</h1>
            <p class="subtitle">Track, manage, and resolve bugs efficiently</p>
        </div>
    </header>

    <main>
        <section class="controls">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search bugs by title...">
                <button id="searchBtn" class="btn btn-secondary">Search</button>
            </div>
            <div class="filter-bar">
                <select id="statusFilter">
                    <option value="">All Statuses</option>
                    <option value="OPEN">Open</option>
                    <option value="IN_PROGRESS">In Progress</option>
                    <option value="RESOLVED">Resolved</option>
                    <option value="CLOSED">Closed</option>
                </select>
                <select id="priorityFilter">
                    <option value="">All Priorities</option>
                    <option value="LOW">Low</option>
                    <option value="MEDIUM">Medium</option>
                    <option value="HIGH">High</option>
                    <option value="CRITICAL">Critical</option>
                </select>
                <button id="newBugBtn" class="btn btn-primary">+ New Bug</button>
            </div>
        </section>

        <section id="bugForm" class="bug-form hidden">
            <h2 id="formTitle">Report a Bug</h2>
            <form id="bugFormElement">
                <input type="hidden" id="bugId">
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" required maxlength="200">
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="4" maxlength="2000"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="priority">Priority *</label>
                        <select id="priority" required>
                            <option value="LOW">Low</option>
                            <option value="MEDIUM" selected>Medium</option>
                            <option value="HIGH">High</option>
                            <option value="CRITICAL">Critical</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="status">Status *</label>
                        <select id="status" required>
                            <option value="OPEN" selected>Open</option>
                            <option value="IN_PROGRESS">In Progress</option>
                            <option value="RESOLVED">Resolved</option>
                            <option value="CLOSED">Closed</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="reporter">Reporter</label>
                        <input type="text" id="reporter" maxlength="100">
                    </div>
                    <div class="form-group">
                        <label for="assignee">Assignee</label>
                        <input type="text" id="assignee" maxlength="100">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
                </div>
            </form>
        </section>

        <section class="bug-list">
            <div id="bugTable">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Assignee</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bugTableBody">
                    </tbody>
                </table>
            </div>
            <p id="emptyState" class="empty-state hidden">No bugs found. Click "+ New Bug" to report one.</p>
        </section>
    </main>

    <script src="/js/app.js"></script>
</body>
</html>
